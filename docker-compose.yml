services:
  postgres:
    image: postgres:16-alpine
    container_name: click-casal-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: clickcasal
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: clickcasal_dev
    ports:
      - "5433:5432"
    volumes:
      - click_casal_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clickcasal -d clickcasal_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  click_casal_pg_data:
